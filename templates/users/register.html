{% extends "base.html" %}

{%block content %}
    <div class="w-6/12 border rounded-lg bg-white p-4 mx-auto border-zinc-300">
        <h1 class="font-bold text-2xl">Регистрация</h1>
        <p class="text-sm text-zinc-500 font-medium">Войдите чтобы создавать посты, комментировать и сохранять в избранное</p>

        <form method="post" "mt-4 flex flex-col gap-4">
            <div>
                <label for="username" class="block text-sm text-zinc-500">Имя пользователя</label>
                <input type="text" id="username" name="username" value="{{username_value}}" placeholder="Имя пользователя" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {{errors.username}}
            </div>

            <div>
                <label for="email" class="block text-sm text-zinc-500">Email</label>
                <input type="text" id="email" name="email" value="{{email_value}}" placeholder="Email" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {{errors.email}}
            </div>

            <div>
                <label for="password" class="block text-sm text-zinc-500">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Пароль" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {{errors.password}}
            </div>
            
            <div>
                <label for="password2" class="block text-sm text-zinc-500">Повторите пароль</label>
                <input type="password" id="password2" name="password2" placeholder="Пароль" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {{errors.password2}}
            </div>

            <button type="submit" class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">
                Создать аккаунт
            </button>

            <p class="mt-5 text-sm text-center text-slate-600">Уже есть аккаунт?
                <a href="{% url 'login' %}" class="text-blue-600">Войти</a>
            </p>
        </form>
    </div>
{% endblock %}
