{% extends "base.html" %}

{%block content %}
    <div class="w-6/12 border rounded-lg bg-white p-4 mx-auto border-zinc-300">
        <h1 class="font-bold text-2xl">Вход</h1>
        <p class="text-sm text-zinc-500 font-medium">Войдите чтобы создавать посты, комментировать и сохранять в избранное</p>

        <form method="post" class="mt-4 flex flex-col gap-4">
        {% csrf_token %}
        {{non_field_errors}}
            <div>
                <label for="username" class="block text-sm text-zinc-500">Имя пользователя</label>
                <input type="text" id="username" placeholder="Имя пользователя" name="username" value="{{username_value}}" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {{errors.username}}
            </div>

            <div>
                <label for="username" class="block text-sm text-zinc-500">Пароль</label>
                <input type="text" id="password" placeholder="Пароль" name="password" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {{errors.password}}
            </div>

            <button type="submit" class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">
                Войти
            </button>

            <p class="mt-5 text-sm text-slate-600">Нет аккаунта
                <a href="{% url 'register' %}" class="text-blue-600">Зарегестрироваться</a>
            </p>
        </form>
    </div>
{% endblock %}
