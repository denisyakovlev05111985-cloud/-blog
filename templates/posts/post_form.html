{% extends "base.html" %}

{%block content %}
<h1 class="text-2xl font-bold">{% if object %}Редактировать пост{% else %} Новый пост{%endif%}</h1>
        <form class="mt-4 flex flex-col gap-4" method="POST">
            {% csrf_token %}


            <div>
                <label for="title" class="block text-sm text-zinc-500">Заголовок</label>
                <input type="text" id="title" placeholder="Заголовок" name="title" value="{{ title_Value }}" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
                {% if errors.title %}
                    <p class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"></p>
                {%endif %}
            </div>

            <div>
                <label for="title" class="block text-sm text-zinc-500">Текст</label>
                <textarea id="text" placeholder="Текст поста" name="text" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg">{{text_value}}</textarea>
            </div>

            <button type="submit" class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">{% if object %}Сохранить{% else %} Создать{%endif%}</button>

        </form>
{% endblock %}
