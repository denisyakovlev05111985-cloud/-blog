{% extends "base.html" %}

{%block content %}
<h1 class="text-2xl font-bold">Новый пост</h1>
        <form class="mt-4 flex flex-col gap-4">
            <div>
                <label for="title" class="block text-sm text-zinc-500">Заголовок</label>
                <input type="text" id="title" placeholder="Заголовок" name="title" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
            </div>

            <div>
                <label for="title" class="block text-sm text-zinc-500">Текст</label>
                <input id="text" placeholder="Текст поста" name="text" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
            </div>

            <button type="submit" class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg"">Создать</button>

        </form>
{% endblock %}
